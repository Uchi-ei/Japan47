<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本列島 難読・県庁所在地クイズ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00d2d3; margin-bottom: 10px; }
        .stats-bar { font-size: 0.9rem; color: #888; margin-bottom: 20px; }
        
        .quiz-box { background: #2d2d2d; padding: 40px 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #444; }
        .question-label { font-size: 1.1rem; color: #aaa; margin-bottom: 10px; }
        .question-text { font-size: 2.5rem; font-weight: bold; color: #fff; }

        .ui-section { display: flex; flex-direction: column; gap: 15px; }
        input { padding: 15px; font-size: 1.2rem; border-radius: 10px; border: none; outline: none; text-align: center; background: #3d3d3d; color: white; }
        
        .btns { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 10px; border: none; transition: 0.2s; }
        #check-btn { background: #00a8ff; color: white; }
        #skip-btn { background: #576574; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        #msg { font-size: 1.2rem; font-weight: bold; min-height: 1.5em; margin: 15px 0; }
        .correct { color: #2ed573; }
        .wrong { color: #ff4757; }

        /* 結果画面 */
        #result-screen { display: none; text-align: left; }
        .result-score { font-size: 3rem; text-align: center; color: #fbc531; margin: 20px 0; }
        .result-list { max-height: 300px; overflow-y: auto; background: #2d2d2d; padding: 15px; border-radius: 10px; font-size: 0.9rem; }
        .result-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #444; }
        .res-ok { color: #2ed573; }
        .res-ng { color: #ff4757; }
        #retry-btn { width: 100%; background: #2ed573; color: white; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <h2>日本列島クイズ</h2>
        <div class="stats-bar">進捗: <span id="progress">0</span> / 47</div>
        
        <div class="quiz-box">
            <div class="question-label" id="q-label">この都道府県の県庁所在地は？</div>
            <div class="question-text" id="q-target">---</div>
        </div>

        <div class="ui-section">
            <input type="text" id="answer-input" placeholder="答えを入力" autocomplete="off">
            <div id="msg"></div>
            <div class="btns">
                <button id="skip-btn" onclick="skip()">スキップ</button>
                <button id="check-btn" onclick="judge()">回答する</button>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <h2>クイズ結果</h2>
        <div class="result-score" id="final-score">0%</div>
        <div id="final-stats" style="text-align: center; margin-bottom: 20px;"></div>
        <div class="result-list" id="result-details"></div>
        <button id="retry-btn" onclick="location.reload()">もう一度挑戦</button>
    </div>
</div>

<script>
const japanData = [
    {n:"北海道", c:"札幌市"}, {n:"青森県", c:"青森市"}, {n:"岩手県", c:"盛岡市"},
    {n:"宮城県", c:"仙台市"}, {n:"秋田県", c:"秋田市"}, {n:"山形県", c:"山形市"},
    {n:"福島県", c:"福島市"}, {n:"茨城県", c:"水戸市"}, {n:"栃木県", c:"宇都宮市"},
    {n:"群馬県", c:"前橋市"}, {n:"埼玉県", c:"さいたま市"}, {n:"千葉県", c:"千葉市"},
    {n:"東京都", c:"新宿区"}, {n:"神奈川県", c:"横浜市"}, {n:"新潟県", c:"新潟市"},
    {n:"富山県", c:"富山市"}, {n:"石川県", c:"金沢市"}, {n:"福井県", c:"福井市"},
    {n:"山梨県", c:"甲府市"}, {n:"長野県", c:"長野市"}, {n:"岐阜県", c:"岐阜市"},
    {n:"静岡県", c:"静岡市"}, {n:"愛知県", c:"名古屋市"}, {n:"三重県", c:"津市"},
    {n:"滋賀県", c:"大津市"}, {n:"京都府", c:"京都市"}, {n:"大阪府", c:"大阪市"},
    {n:"兵庫県", c:"神戸市"}, {n:"奈良県", c:"奈良市"}, {n:"和歌山県", c:"和歌山市"},
    {n:"鳥取県", c:"鳥取市"}, {n:"島根県", c:"松江市"}, {n:"岡山県", c:"岡山市"},
    {n:"広島県", c:"広島市"}, {n:"山口県", c:"山口市"}, {n:"徳島県", c:"徳島市"},
    {n:"香川県", c:"高松市"}, {n:"愛媛県", c:"松山市"}, {n:"高知県", c:"高知市"},
    {n:"福岡県", c:"福岡市"}, {n:"佐賀県", c:"佐賀市"}, {n:"長崎県", c:"長崎市"},
    {n:"熊本県", c:"熊本市"}, {n:"大分県", c:"大分市"}, {n:"宮崎県", c:"宮崎市"},
    {n:"鹿児島県", c:"鹿児島市"}, {n:"沖縄県", c:"那覇市"}
];

let currentIndex = 0;
let quizList = [];
let results = []; // {name, target, user, isCorrect}

function init() {
    // リストをシャッフル
    quizList = [...japanData].sort(() => Math.random() - 0.5);
    showQuestion();
}

function showQuestion() {
    if (currentIndex >= quizList.length) {
        showFinalResult();
        return;
    }
    const target = quizList[currentIndex];
    document.getElementById('progress').innerText = currentIndex + 1;
    document.getElementById('q-target').innerText = target.n;
    document.getElementById('answer-input').value = "";
    document.getElementById('msg').innerText = "";
    document.getElementById('answer-input').focus();
}

function judge() {
    const input = document.getElementById('answer-input').value.trim();
    if (!input) return;

    const target = quizList[currentIndex];
    // 東京の例外処理と「市」の有無を許容
    const isCorrect = (input === target.c || input === target.c.replace('市','').replace('区',''));
    
    results.push({
        name: target.n,
        correct: target.c,
        user: input,
        isCorrect: isCorrect
    });

    const msgEl = document.getElementById('msg');
    if (isCorrect) {
        msgEl.innerText = "⭕ 正解！";
        msgEl.className = "correct";
    } else {
        msgEl.innerText = `❌ 残念！ 正解は ${target.c}`;
        msgEl.className = "wrong";
    }

    currentIndex++;
    setTimeout(showQuestion, 1000);
}

function skip() {
    const target = quizList[currentIndex];
    results.push({
        name: target.n,
        correct: target.c,
        user: "(スキップ)",
        isCorrect: false
    });
    document.getElementById('msg').innerText = `⏩ スキップしました（正解: ${target.c}）`;
    document.getElementById('msg').className = "";
    currentIndex++;
    setTimeout(showQuestion, 800);
}

function showFinalResult() {
    document.getElementById('quiz-screen').style.display = "none";
    document.getElementById('result-screen').style.display = "block";

    const correctCount = results.filter(r => r.isCorrect).length;
    const scorePercent = Math.round((correctCount / results.length) * 100);
    
    document.getElementById('final-score').innerText = scorePercent + "%";
    document.getElementById('final-stats').innerText = `全${results.length}問中 ${correctCount}問正解`;

    const detailsEl = document.getElementById('result-details');
    detailsEl.innerHTML = results.map(r => `
        <div class="result-item">
            <span>${r.name}</span>
            <span class="${r.isCorrect ? 'res-ok' : 'res-ng'}">
                ${r.isCorrect ? '⭕ ' : '❌ '}${r.user} (正解: ${r.correct})
            </span>
        </div>
    `).join('');
}

// Enterキーで回答
document.getElementById('answer-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') judge();
});

init();
</script>
</body>
</html>
