<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>日本地図・矢印クイズ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding: 20px; }
        .container { background: white; max-width: 800px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 地図のスタイル */
        #map-container { position: relative; width: 100%; max-width: 500px; margin: 20px auto; background: #e0f7fa; border-radius: 10px; }
        svg { width: 100%; height: auto; }
        .pref { fill: #ffffff; stroke: #666; stroke-width: 0.5; transition: fill 0.3s; }
        .highlight { fill: #ff7675 !important; } /* 出題中の県を赤くする */
        .cleared { fill: #55efc4 !important; }   /* 正解済みの県を緑にする */

        /* クイズ部分のスタイル */
        .quiz-ui { margin-top: 20px; }
        input { padding: 10px; margin: 5px; border: 2px solid #ddd; border-radius: 5px; width: 180px; }
        button { padding: 10px 20px; background: #0984e3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #74b9ff; }
        
        #result { margin-top: 15px; font-weight: bold; height: 1.5em; }
        .stats { color: #636e72; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>日本地図クイズ (残り<span id="remain-count">47</span>県)</h1>
    
    <div id="map-container">
        <svg viewBox="0 0 500 500" id="japan-map">
            </svg>
    </div>

    <div class="quiz-ui">
        <p>赤い矢印（ハイライト）の場所はどこ？</p>
        <input type="text" id="ans-pref" placeholder="県名（例：東京都）">
        <input type="text" id="ans-city" placeholder="県庁所在地（例：新宿区）">
        <button onclick="checkAnswer()">回答</button>
        <div id="result"></div>
    </div>
    
    <button style="margin-top:20px; background:#fab1a0;" onclick="resetGame()">データをリセット</button>
</div>

<script>
// 都道府県データ（位置座標はおおよその目安です）
const prefs = [
    { name: "北海道", city: "札幌市", x: 400, y: 50 },
    { name: "青森県", city: "青森市", x: 380, y: 130 },
    { name: "岩手県", city: "盛岡市", x: 390, y: 160 },
    { name: "宮城県", city: "仙台市", x: 385, y: 190 },
    { name: "秋田県", city: "秋田市", x: 365, y: 160 },
    { name: "山形県", city: "山形市", x: 365, y: 190 },
    { name: "福島県", city: "福島市", x: 375, y: 220 },
    { name: "茨城県", city: "水戸市", x: 370, y: 260 },
    { name: "栃木県", city: "宇都宮市", x: 355, y: 250 },
    { name: "群馬県", city: "前橋市", x: 340, y: 250 },
    { name: "埼玉県", city: "さいたま市", x: 345, y: 270 },
    { name: "千葉県", city: "千葉市", x: 365, y: 290 },
    { name: "東京都", city: "新宿区", x: 345, y: 285 },
    { name: "神奈川県", city: "横浜市", x: 335, y: 300 },
    { name: "新潟県", city: "新潟市", x: 340, y: 210 },
    { name: "富山県", city: "富山市", x: 305, y: 230 },
    { name: "石川県", city: "金沢市", x: 285, y: 220 },
    { name: "福井県", city: "福井市", x: 275, y: 250 },
    { name: "山梨県", city: "甲府市", x: 320, y: 280 },
    { name: "長野県", city: "長野市", x: 315, y: 250 },
    { name: "岐阜県", city: "岐阜市", x: 290, y: 275 },
    { name: "静岡県", city: "静岡市", x: 315, y: 310 },
    { name: "愛知県", city: "名古屋市", x: 295, y: 300 },
    { name: "三重県", city: "津市", x: 275, y: 315 },
    { name: "滋賀県", city: "大津市", x: 265, y: 280 },
    { name: "京都府", city: "京都市", x: 250, y: 280 },
    { name: "大阪府", city: "大阪市", x: 245, y: 300 },
    { name: "兵庫県", city: "神戸市", x: 225, y: 290 },
    { name: "奈良県", city: "奈良市", x: 255, y: 310 },
    { name: "和歌山県", city: "和歌山市", x: 245, y: 335 },
    { name: "鳥取県", city: "鳥取市", x: 205, y: 275 },
    { name: "島根県", city: "松江市", x: 175, y: 285 },
    { name: "岡山県", city: "岡山市", x: 195, y: 300 },
    { name: "広島県", city: "広島市", x: 170, y: 310 },
    { name: "山口県", city: "山口市", x: 135, y: 320 },
    { name: "徳島県", city: "徳島市", x: 210, y: 345 },
    { name: "香川県", city: "高松市", x: 200, y: 325 },
    { name: "愛媛県", city: "松山市", x: 170, y: 345 },
    { name: "高知県", city: "高知市", x: 185, y: 365 },
    { name: "福岡県", city: "福岡市", x: 100, y: 340 },
    { name: "佐賀県", city: "佐賀市", x: 80, y: 350 },
    { name: "長崎県", city: "長崎市", x: 65, y: 365 },
    { name: "熊本県", city: "熊本市", x: 90, y: 380 },
    { name: "大分県", city: "大分市", x: 120, y: 365 },
    { name: "宮崎県", city: "宮崎市", x: 110, y: 410 },
    { name: "鹿児島県", city: "鹿児島市", x: 85, y: 430 },
    { name: "沖縄県", city: "那覇市", x: 50, y: 460 }
];

let cleared = JSON.parse(localStorage.getItem('map_quiz_cleared')) || [];
let currentTarget;

function initMap() {
    const svg = document.getElementById('japan-map');
    prefs.forEach(p => {
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", p.x);
        circle.setAttribute("cy", p.y);
        circle.setAttribute("r", 8);
        circle.setAttribute("id", "pref-" + p.name);
        circle.setAttribute("class", "pref " + (cleared.includes(p.name) ? "cleared" : ""));
        svg.appendChild(circle);
    });
    nextQuestion();
}

function nextQuestion() {
    document.querySelectorAll('.pref').forEach(el => el.classList.remove('highlight'));
    const remaining = prefs.filter(p => !cleared.includes(p.name));
    
    if (remaining.length === 0) {
        document.querySelector('.quiz-ui').innerHTML = "<h2>🎉 全県制覇！お見事です！</h2>";
        return;
    }
    
    currentTarget = remaining[Math.floor(Math.random() * remaining.length)];
    document.getElementById('pref-' + currentTarget.name).classList.add('highlight');
    document.getElementById('ans-pref').value = "";
    document.getElementById('ans-city').value = "";
    document.getElementById('remain-count').innerText = remaining.length;
}

function checkAnswer() {
    const p = document.getElementById('ans-pref').value.trim();
    const c = document.getElementById('ans-city').value.trim();
    const res = document.getElementById('result');

    if (p === currentTarget.name && c === currentTarget.city) {
        res.innerText = "⭕ 正解！";
        res.style.color = "green";
        cleared.push(currentTarget.name);
        localStorage.setItem('map_quiz_cleared', JSON.stringify(cleared));
        document.getElementById('pref-' + currentTarget.name).classList.add('cleared');
        setTimeout(nextQuestion, 1000);
    } else {
        res.innerText = "❌ 違うよ！";
        res.style.color = "red";
    }
}

function resetGame() {
    if(confirm("進捗を消去しますか？")) {
        localStorage.removeItem('map_quiz_cleared');
        location.reload();
    }
}

initMap();
</script>
</body>
</html>
