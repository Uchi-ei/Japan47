<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>47都道府県・形状判別クイズ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; width: 95%; max-width: 900px; margin: 20px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        
        /* 地図エリア */
        #map-container { width: 100%; height: 500px; background: #e3f2fd; border-radius: 10px; position: relative; margin-bottom: 20px; overflow: hidden; }
        svg { width: 100%; height: 100%; }
        path { fill: #ffffff; stroke: #999; stroke-width: 0.2; transition: fill 0.2s; }
        .highlight { fill: #ff5252 !important; stroke: #b71c1c; stroke-width: 0.5; }
        .cleared { fill: #a5d6a7 !important; }

        /* 入力エリア */
        .ui-panel { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 8px; width: 200px; font-size: 16px; }
        button { padding: 12px 30px; background: #1976d2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #1565c0; }
        
        #message { font-weight: bold; font-size: 1.1rem; height: 1.5em; margin: 10px 0; }
        .progress { color: #666; font-size: 0.9rem; }
        .reset-btn { margin-top: 20px; background: #9e9e9e; font-size: 12px; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>日本列島 完遂クイズ</h1>
    <div class="progress">残り: <span id="remain-count">47</span> / 47 県</div>
    
    <div id="map-container">
        <svg viewBox="0 0 800 600" id="japan-svg">
            </svg>
    </div>

    <div class="ui-panel">
        <div id="message">赤色の場所を答えてください</div>
        <div class="input-group">
            <input type="text" id="ans-pref" placeholder="県名（例：神奈川県）" autocomplete="off">
            <input type="text" id="ans-city" placeholder="県庁所在地（例：横浜市）" autocomplete="off">
            <button onclick="checkAnswer()">回答する</button>
        </div>
    </div>
    
    <button class="reset-btn" onclick="resetGame()">データをリセット</button>
</div>

<script>

    {id: 21, name: "岐阜県", city: "岐阜市", d: "M474,339 l35,10 l-5,45 l-30,-15 Z"},

    {id: 46, name: "鹿児島県", city: "鹿児島市", d: "M224,474 l35,20 l-20,40 l-25,-30 Z"},
    {id: 47, name: "沖縄県", city: "那覇市", d: "M150,530 l30,15 l-10,10 l-25,-10 Z"}
];

let cleared = JSON.parse(localStorage.getItem('jp_quiz_v2')) || [];
let current;

function init() {
    const svg = document.getElementById('japan-svg');
    prefData.forEach(p => {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", p.d);
        path.setAttribute("id", "p-" + p.id);
        if(cleared.includes(p.name)) path.classList.add('cleared');
        svg.appendChild(path);
    });
    next();
}

function next() {
    document.querySelectorAll('path').forEach(p => p.classList.remove('highlight'));
    const remains = prefData.filter(p => !cleared.includes(p.name));
    document.getElementById('remain-count').innerText = remains.length;
    
    if(remains.length === 0) {
        document.getElementById('message').innerText = "🎉 全47都道府県コンプリート！";
        return;
    }
    
    current = remains[Math.floor(Math.random() * remains.length)];
    document.getElementById('p-' + current.id).classList.add('highlight');
    document.getElementById('ans-pref').value = "";
    document.getElementById('ans-city').value = "";
    document.getElementById('ans-pref').focus();
}

function checkAnswer() {
    const ap = document.getElementById('ans-pref').value.trim();
    const ac = document.getElementById('ans-city').value.trim();
    const msg = document.getElementById('message');

    if(ap === current.name && ac === current.city) {
        msg.innerText = "⭕ 正解！";
        msg.style.color = "#2e7d32";
        cleared.push(current.name);
        localStorage.setItem('jp_quiz_v2', JSON.stringify(cleared));
        document.getElementById('p-' + current.id).classList.add('cleared');
        setTimeout(next, 1000);
    } else {
        msg.innerText = "❌ まちがい！";
        msg.style.color = "#d32f2f";
    }
}

function resetGame() {
    if(confirm("データをすべて消しますか？")) {
        localStorage.removeItem('jp_quiz_v2');
        location.reload();
    }
}

// Enterキー対応
document.addEventListener('keydown', e => { if(e.key === 'Enter') checkAnswer(); });

init();
</script>
</body>
</html>
